<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oh My God — Discord Сервер</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Анимированный фон */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(60, 80, 40, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(80, 60, 30, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(40, 60, 30, 0.05) 0%, transparent 50%);
            z-index: 0;
            animation: bgPulse 8s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        /* Лианы по бокам */
        .vine-left, .vine-right {
            position: fixed;
            top: 0;
            width: 80px;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            opacity: 0.6;
        }

        .vine-left {
            left: 10px;
            background: 
                repeating-linear-gradient(
                    165deg,
                    transparent,
                    transparent 20px,
                    rgba(60, 100, 40, 0.3) 20px,
                    rgba(60, 100, 40, 0.3) 23px
                ),
                repeating-linear-gradient(
                    195deg,
                    transparent,
                    transparent 25px,
                    rgba(50, 90, 30, 0.25) 25px,
                    rgba(50, 90, 30, 0.25) 27px
                );
            border-right: 3px solid rgba(40, 70, 20, 0.3);
            animation: vineSway 7s ease-in-out infinite alternate;
        }

        .vine-right {
            right: 10px;
            background: 
                repeating-linear-gradient(
                    195deg,
                    transparent,
                    transparent 20px,
                    rgba(60, 100, 40, 0.3) 20px,
                    rgba(60, 100, 40, 0.3) 23px
                ),
                repeating-linear-gradient(
                    165deg,
                    transparent,
                    transparent 25px,
                    rgba(50, 90, 30, 0.25) 25px,
                    rgba(50, 90, 30, 0.25) 27px
                );
            border-left: 3px solid rgba(40, 70, 20, 0.3);
            animation: vineSway 6s ease-in-out infinite alternate-reverse;
        }

        @keyframes vineSway {
            0% { transform: skewX(0.5deg); }
            50% { transform: skewX(-0.5deg); }
            100% { transform: skewX(0.5deg); }
        }

        /* Листья на лианах */
        .vine-left::before,
        .vine-right::before {
            content: "🌿";
            position: absolute;
            font-size: 2rem;
            animation: leafFall 4s ease-in-out infinite;
        }

        .vine-left::before {
            top: 15%;
            left: -10px;
        }
        .vine-right::before {
            top: 25%;
            right: -10px;
            animation-delay: 1.5s;
        }

        .vine-left::after,
        .vine-right::after {
            content: "🍃";
            position: absolute;
            font-size: 1.5rem;
            animation: leafFall 3.5s ease-in-out infinite;
        }

        .vine-left::after {
            top: 55%;
            left: 5px;
            animation-delay: 2s;
        }
        .vine-right::after {
            top: 60%;
            right: 5px;
            animation-delay: 0.5s;
        }

        @keyframes leafFall {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.5; }
            50% { transform: translateY(15px) rotate(10deg); opacity: 0.8; }
        }

        /* Дополнительные лианы */
        .vine-extra-left,
        .vine-extra-right {
            position: fixed;
            top: 0;
            width: 40px;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            opacity: 0.4;
        }

        .vine-extra-left {
            left: 60px;
            background: repeating-linear-gradient(
                180deg,
                transparent,
                transparent 40px,
                rgba(50, 80, 30, 0.3) 40px,
                rgba(50, 80, 30, 0.3) 42px
            );
            animation: vineSway 8s ease-in-out infinite alternate;
        }

        .vine-extra-right {
            right: 60px;
            background: repeating-linear-gradient(
                180deg,
                transparent,
                transparent 35px,
                rgba(50, 80, 30, 0.3) 35px,
                rgba(50, 80, 30, 0.3) 37px
            );
            animation: vineSway 7.5s ease-in-out infinite alternate-reverse;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 900px;
            width: 100%;
            background: rgba(16, 16, 16, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 32px;
            padding: 50px 40px 40px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7);
            text-align: center;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
        }

        /* Бейдж — висящий */
        .badge-wrapper {
            text-align: center;
            margin-bottom: 18px;
            animation: hangingSway 3s ease-in-out infinite;
            transform-origin: top center;
        }

        @keyframes hangingSway {
            0%, 100% { transform: rotate(-2deg); }
            50% { transform: rotate(2deg); }
        }

        .badge {
            display: inline-block;
            background: linear-gradient(135deg, rgba(120, 80, 255, 0.2), rgba(200, 100, 200, 0.2));
            border: 1px solid rgba(180, 140, 255, 0.3);
            color: #c5b0ff;
            font-size: 0.8rem;
            font-weight: 600;
            padding: 6px 16px;
            border-radius: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
            position: relative;
        }

        /* Верёвочка для бейджа */
        .badge::before {
            content: "";
            position: absolute;
            top: -30px;
            left: 50%;
            width: 2px;
            height: 30px;
            background: rgba(180, 160, 200, 0.4);
            transform: translateX(-50%);
        }

        /* Аватарка — по центру */
        .avatar-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 15px;
        }

        .server-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 0 8px rgba(120, 80, 255, 0.15), 0 20px 50px rgba(0, 0, 0, 0.5);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1.2);
        }

        .server-avatar:hover {
            transform: scale(1.08) rotate(3deg);
            border-color: rgba(200, 170, 255, 0.5);
            box-shadow: 0 0 0 14px rgba(120, 80, 255, 0.25), 0 25px 60px rgba(120, 80, 255, 0.2);
        }

        /* Заголовки */
        .server-name {
            font-size: 3rem;
            font-weight: 900;
            margin: 10px 0 5px;
            background: linear-gradient(135deg, #ffffff 0%, #d4c0ff 50%, #ffb0c0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
            line-height: 1.1;
        }

        .subtitle {
            font-size: 1rem;
            color: #808090;
            margin-bottom: 35px;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        /* Секция с информацией */
        .info-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .info-card {
            flex: 1 1 230px;
            max-width: 270px;
            background: rgba(255, 255, 255, 0.025);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 24px 18px;
            text-align: left;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .info-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(180, 150, 255, 0.4), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .info-card:hover::before {
            opacity: 1;
        }

        .info-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.12);
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        }

        .info-card .icon {
            font-size: 2rem;
            margin-bottom: 14px;
            display: block;
        }

        .info-card h3 {
            font-size: 1.1rem;
            font-weight: 700;
            margin: 0 0 8px;
            color: #e8e0ff;
        }

        .info-card p {
            font-size: 0.88rem;
            color: #9898aa;
            line-height: 1.55;
            margin: 0;
        }

        /* Тег админа */
        .admin-tag {
            display: inline-block;
            background: rgba(120, 80, 255, 0.2);
            color: #c4b0ff;
            padding: 5px 12px;
            border-radius: 8px;
            font-weight: 700;
            font-family: 'Inter', monospace;
            letter-spacing: 0.3px;
            cursor: pointer;
            transition: all 0.25s;
            border: 1px solid rgba(180, 150, 255, 0.2);
            user-select: none;
            position: relative;
        }

        .admin-tag:hover {
            background: rgba(120, 80, 255, 0.4);
            border-color: rgba(200, 170, 255, 0.5);
            color: #ffffff;
            box-shadow: 0 0 20px rgba(140, 100, 255, 0.3);
        }

        .admin-tag:active {
            transform: scale(0.95);
            background: rgba(120, 80, 255, 0.55);
            transition: transform 0.1s;
        }

        /* Статистика сервера */
        .stats-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin: 25px 0 30px;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.6rem;
            font-weight: 800;
            color: #e0d0ff;
            letter-spacing: -0.5px;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #707080;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        .stat-divider {
            width: 1px;
            height: 40px;
            background: rgba(255, 255, 255, 0.08);
        }

        /* Всплывающая подсказка копирования */
        .tooltip-popup {
            position: fixed;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e1e2e;
            color: #fff;
            padding: 14px 30px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.95rem;
            box-shadow: 0 12px 35px rgba(0,0,0,0.7);
            z-index: 998;
            opacity: 0;
            transition: opacity 0.3s ease, top 0.3s ease;
            pointer-events: none;
            border: 1px solid rgba(255,255,255,0.15);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tooltip-popup.show {
            opacity: 1;
            top: 35px;
        }

        /* Обёртка для кнопки с цепями */
        .join-button-wrapper {
            position: relative;
            display: inline-block;
            margin-top: 5px;
        }

        /* Цепи сверху и снизу */
        .join-button-wrapper::before,
        .join-button-wrapper::after {
            content: "⛓️";
            position: absolute;
            font-size: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            pointer-events: none;
            animation: chainHang 3s ease-in-out infinite;
        }

        .join-button-wrapper::before {
            top: -28px;
        }

        .join-button-wrapper::after {
            bottom: -28px;
            animation-delay: 1.5s;
        }

        @keyframes chainHang {
            0%, 100% { transform: translateX(-50%) rotate(0deg); }
            50% { transform: translateX(-50%) rotate(5deg); }
        }

        /* Кнопка — убегающая, с цепями */
        .join-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #ffffff;
            color: #0a0a0a;
            text-decoration: none;
            padding: 16px 44px;
            border-radius: 16px;
            font-size: 1.15rem;
            font-weight: 700;
            transition: all 0.15s ease;
            box-shadow: 0 8px 30px rgba(255, 255, 255, 0.08);
            letter-spacing: 0.3px;
            border: none;
            cursor: pointer;
            position: relative;
            z-index: 2;
            animation: chainRattle 2s ease-in-out infinite;
        }

        @keyframes chainRattle {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-1px); }
            75% { transform: translateX(1px); }
        }

        .join-button:hover {
            background: #f0e8ff;
            box-shadow: 0 18px 45px rgba(180, 160, 255, 0.3);
        }

        .join-button .discord-logo {
            width: 24px;
            height: 24px;
        }

        /* Всплывашка "Хорошая попытка" */
        .catch-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(20, 20, 30, 0.95);
            border: 1px solid rgba(200, 180, 255, 0.4);
            color: #ffffff;
            padding: 35px 50px;
            border-radius: 24px;
            font-size: 2rem;
            font-weight: 800;
            z-index: 1000;
            pointer-events: none;
            text-align: center;
            box-shadow: 0 25px 70px rgba(120, 80, 255, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            letter-spacing: 2px;
        }

        .catch-popup.show {
            transform: translate(-50%, -50%) scale(1);
            animation: popShake 0.5s ease-in-out;
        }

        @keyframes popShake {
            0%, 100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
            20% { transform: translate(-50%, -50%) scale(1.1) rotate(-3deg); }
            40% { transform: translate(-50%, -50%) scale(0.95) rotate(3deg); }
            60% { transform: translate(-50%, -50%) scale(1.05) rotate(-1deg); }
            80% { transform: translate(-50%, -50%) scale(0.98) rotate(1deg); }
        }

        .catch-popup .thumb-emoji {
            display: block;
            font-size: 4rem;
            margin-bottom: 10px;
        }

        /* Затемнение фона при появлении */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .overlay.show {
            opacity: 1;
        }

        /* Футер */
        .footer-note {
            margin-top: 25px;
            font-size: 0.8rem;
            color: #555565;
            letter-spacing: 0.3px;
        }

        /* Адаптация */
        @media (max-width: 650px) {
            .container {
                padding: 35px 20px 30px;
            }
            .server-name {
                font-size: 2.2rem;
            }
            .info-row {
                flex-direction: column;
                align-items: center;
            }
            .info-card {
                max-width: 100%;
                width: 100%;
            }
            .stats-row {
                gap: 25px;
            }
            .stat-divider {
                display: none;
            }
            .catch-popup {
                font-size: 1.5rem;
                padding: 25px 30px;
            }
            .catch-popup .thumb-emoji {
                font-size: 3rem;
            }
            .vine-left, .vine-right {
                width: 40px;
            }
            .vine-extra-left, .vine-extra-right {
                width: 20px;
            }
        }
    </style>
</head>
<body>

    <!-- Лианы -->
    <div class="vine-left"></div>
    <div class="vine-right"></div>
    <div class="vine-extra-left"></div>
    <div class="vine-extra-right"></div>

    <!-- Затемнение фона -->
    <div class="overlay" id="overlay"></div>

    <!-- Всплывашка "Хорошая попытка" -->
    <div class="catch-popup" id="catchPopup">
        <span class="thumb-emoji">👍</span>
        Хорошая попытка
    </div>

    <!-- Всплывающее уведомление копирования -->
    <div class="tooltip-popup" id="copyTooltip">✅ Ник скопирован!</div>

    <div class="container">
        <!-- Бейдж над аватаркой — висящий -->
        <div class="badge-wrapper">
            <span class="badge">⚡ ДОБРО ПОЖАЛОВАТЬ</span>
        </div>

        <!-- Аватарка сервера по центру -->
        <div class="avatar-wrapper">
            <img src="https://images.steamusercontent.com/ugc/11566623734136190197/E4277FBC38617BCAC1B4A6DC7B32DB4587304EC2/?imw=512&amp;&amp;ima=fit&amp;impolicy=Letterbox&amp;imcolor=%23000000&amp;letterbox=false" 
                 alt="Аватар Discord сервера" 
                 class="server-avatar">
        </div>

        <!-- Название сервера -->
        <h1 class="server-name">Oh My God</h1>
        <p class="subtitle">Сообщество, в котором ты почувствуешь себя как дома</p>

        <!-- Статистика -->
        <div class="stats-row">
            <div class="stat-item">
                <div class="stat-value">24/7</div>
                <div class="stat-label">Онлайн</div>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-item">
                <div class="stat-value">0%</div>
                <div class="stat-label">Токсичности</div>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-item">
                <div class="stat-value">∞</div>
                <div class="stat-label">Поддержка</div>
            </div>
        </div>

        <!-- Информационные блоки -->
        <div class="info-row">
            <div class="info-card">
                <span class="icon">🛡️</span>
                <h3>Администратор</h3>
                <p>
                    Сервером управляет 
                    <span class="admin-tag" id="adminNick" onclick="copyAdminNick()">@geto_magic</span>.
                    Всегда на связи, справедлив и открыт к предложениям. Нажми на ник, чтобы скопировать!
                </p>
            </div>

            <div class="info-card">
                <span class="icon">🤝</span>
                <h3>Тёплое комьюнити</h3>
                <p>
                    Здесь собрались очень дружелюбные и отзывчивые люди. Уютные голосовые чаты, совместные игры и море позитива ждут тебя.
                </p>
            </div>

            <div class="info-card">
                <span class="icon">💡</span>
                <h3>Всегда поможем</h3>
                <p>
                    Возникли проблемы или трудная ситуация? Участники и администратор обязательно поддержат советом, делом или просто добрым словом.
                </p>
            </div>
        </div>

        <!-- Кнопка "Присоединиться" — убегающая, обвязана цепями -->
        <div class="join-button-wrapper">
            <a href="#" class="join-button" id="joinButton">
                <svg class="discord-logo" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20.317 4.369a19.791 19.791 0 00-4.885-1.515.074.074 0 00-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 00-5.487 0 12.64 12.64 0 00-.617-1.25.077.077 0 00-.079-.037A19.736 19.736 0 003.677 4.37a.07.07 0 00-.032.027C.533 9.045-.32 13.58.099 18.057a.082.082 0 00.031.057 19.9 19.9 0 005.993 3.03.078.078 0 00.084-.028 14.09 14.09 0 001.226-1.994.076.076 0 00-.041-.106 13.107 13.107 0 01-1.872-.892.077.077 0 01-.008-.128 10.2 10.2 0 00.372-.292.074.074 0 01.077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 01.078.01c.12.098.246.198.373.292a.077.077 0 01-.006.127 12.299 12.299 0 01-1.873.892.077.077 0 00-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 00.084.028 19.839 19.839 0 006.002-3.03.074.074 0 00.032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 00-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
                </svg>
                Присоединиться
            </a>
        </div>

        <p class="footer-note">© Oh My God Community — Присоединяйся и будь собой</p>
    </div>

    <script>
        // ===== Копирование ника админа =====
        function copyAdminNick() {
            const nick = "@geto_magic";
            
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(nick).then(function() {
                    showCopyTooltip();
                }).catch(function(err) {
                    console.error("Ошибка копирования: ", err);
                    fallbackCopy(nick);
                });
            } else {
                fallbackCopy(nick);
            }
        }

        function fallbackCopy(text) {
            const textarea = document.createElement("textarea");
            textarea.value = text;
            textarea.style.position = "fixed";
            textarea.style.left = "-9999px";
            textarea.style.top = "-9999px";
            document.body.appendChild(textarea);
            textarea.focus();
            textarea.select();
            try {
                document.execCommand("copy");
                showCopyTooltip();
            } catch (err) {
                alert("Не удалось скопировать ник. Скопируйте вручную: " + text);
            }
            document.body.removeChild(textarea);
        }

        function showCopyTooltip() {
            const tooltip = document.getElementById("copyTooltip");
            tooltip.classList.add("show");
            
            if (window.copyTooltipTimer) clearTimeout(window.copyTooltipTimer);
            
            window.copyTooltipTimer = setTimeout(function() {
                tooltip.classList.remove("show");
            }, 1800);
        }

        // ===== Убегающая кнопка "Присоединиться" =====
        const joinButton = document.getElementById("joinButton");
        const catchPopup = document.getElementById("catchPopup");
        const overlay = document.getElementById("overlay");

        let escapeCount = 0;

        function getRandomPosition() {
            const padding = 40;
            const maxWidth = window.innerWidth - joinButton.offsetWidth - padding;
            const maxHeight = window.innerHeight - joinButton.offsetHeight - padding;
            
            const randomLeft = Math.max(padding, Math.min(Math.random() * maxWidth, maxWidth));
            const randomTop = Math.max(padding, Math.min(Math.random() * maxHeight, maxHeight));
            
            return { left: randomLeft, top: randomTop };
        }

        joinButton.addEventListener("mouseenter", function(e) {
            // Кнопка убегает при наведении
            const newPos = getRandomPosition();
            
            // Делаем кнопку фиксированной при первом убегании
            if (escapeCount === 0) {
                joinButton.style.position = "fixed";
                const rect = joinButton.getBoundingClientRect();
                joinButton.style.left = rect.left + "px";
                joinButton.style.top = rect.top + "px";
            }
            
            joinButton.style.left = newPos.left + "px";
            joinButton.style.top = newPos.top + "px";
            
            escapeCount++;
        });

        // Если удалось кликнуть (мобильные устройства или быстрый клик)
        joinButton.addEventListener("click", function(e) {
            e.preventDefault();
            
            // Показываем всплывашку
            catchPopup.classList.add("show");
            overlay.classList.add("show");
            
            // Убираем через 2 секунды
            if (window.catchTimer) clearTimeout(window.catchTimer);
            
            window.catchTimer = setTimeout(function() {
                catchPopup.classList.remove("show");
                overlay.classList.remove("show");
            }, 2000);
            
            // Кнопка всё равно убегает
            const newPos = getRandomPosition();
            joinButton.style.left = newPos.left + "px";
            joinButton.style.top = newPos.top + "px";
        });

        // Для мобильных — убегает при касании
        joinButton.addEventListener("touchstart", function(e) {
            e.preventDefault();
            const newPos = getRandomPosition();
            
            if (escapeCount === 0) {
                joinButton.style.position = "fixed";
                const rect = joinButton.getBoundingClientRect();
                joinButton.style.left = rect.left + "px";
                joinButton.style.top = rect.top + "px";
            }
            
            joinButton.style.left = newPos.left + "px";
            joinButton.style.top = newPos.top + "px";
            
            escapeCount++;
        });

        // Закрытие по клику на затемнение
        overlay.addEventListener("click", function() {
            catchPopup.classList.remove("show");
            overlay.classList.remove("show");
            if (window.catchTimer) clearTimeout(window.catchTimer);
        });
    </script>

</body>
</html>
